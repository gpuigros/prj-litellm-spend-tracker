<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <!-- Concept 2: Chart/graph with AI brain -->
    <defs>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="128" height="128" rx="20" fill="url(#grad2)" />

    <!-- Chart bars -->
    <rect x="25" y="70" width="12" height="30" fill="#fff" opacity="0.9" />
    <rect x="45" y="55" width="12" height="45" fill="#fff" opacity="0.9" />
    <rect x="65" y="40" width="12" height="60" fill="#fff" opacity="0.9" />
    <rect x="85" y="60" width="12" height="40" fill="#fff" opacity="0.9" />

    <!-- Trend line -->
    <polyline points="31,65 51,50 71,35 91,55" fill="none" stroke="#fff" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" />

    <!-- AI brain icon (top right) -->
    <circle cx="100" cy="28" r="15" fill="#fff" opacity="0.3" />
    <path d="M 95 25 Q 100 20 105 25 Q 108 28 105 31 Q 100 36 95 31 Q 92 28 95 25" fill="#fff"
        opacity="0.9" />
    <circle cx="98" cy="27" r="1.5" fill="#4facfe" />
    <circle cx="102" cy="27" r="1.5" fill="#4facfe" />
    <circle cx="100" cy="30" r="1.5" fill="#4facfe" />
</svg>